<!DOCTYPE html>
<html lang="nl-be">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — poemper</title>
  <script>
    (function () {
      var segmentCount = 1;
      var location = window.location;
      var base =
        location.protocol +
        "//" +
        location.hostname +
        (location.port ? ":" + location.port : "") +
        location.pathname.split("/").slice(0, 1 + segmentCount).join("/") +
        "/";
      document.write('<base href="' + base + '">');
    })();
  </script>
  <link rel="stylesheet" href="CSS/style.css">
  <style>
    body.page-inner.page-404 {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      background: #1a1a2e;
    }
    body.page-404 .page-content {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
      text-align: center;
      background: rgba(0, 0, 0, 0.75);
      box-sizing: border-box;
    }
    body.page-404 .page-content h1 {
      margin: 0;
      font-size: 6rem;
      line-height: 1;
    }
    body.page-404 .page-message {
      margin: 0;
      font-size: 1.1rem;
      opacity: 0.9;
    }
  </style>
</head>
<body class="page-inner page-404">
  <main class="page-content">
    <h1>404</h1>
    <p class="page-message">This page does not exist.</p>
    <a href="HTML/index.html" class="site-link glow-on-hover">Back home</a>
  </main>
</body>
</html>
